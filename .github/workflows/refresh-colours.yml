name: Refresh colours

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Fetch latest named colours from mdn-data
        run: bun gen-colours.vite.ts

      - name: Commit snapshot if it changed
        run: |
          if [[ -n "$(git status --porcelain src/library/colours.build.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/library/colours.build.json
            git commit -m "chore: refresh named colours from mdn-data"
            git push
          else
            echo "No changes to named colours"
          fi
